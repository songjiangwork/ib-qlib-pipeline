qlib_init:
  provider_uri: data/qlib/us_data_custom
  region: us

market: &market all
benchmark: &benchmark AAPL

data_handler_config: &data_handler_config
  start_time: 2020-01-02
  end_time: 2026-03-06
  fit_start_time: 2020-01-02
  fit_end_time: 2023-12-29
  instruments: *market
  label:
    - ["Ref($close, -5) / Ref($open, -1) - 1"]
    - ["LABEL0"]

port_analysis_config: &port_analysis_config
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      signal: <PRED>
      topk: 50
      n_drop: 5
  backtest:
    start_time: 2025-01-02
    end_time: 2026-03-06
    account: 100000000
    benchmark: *benchmark
    exchange_kwargs:
      limit_threshold: 0.095
      deal_price: open
      open_cost: 0.0005
      close_cost: 0.0015
      min_cost: 5

task:
  model:
    class: CatBoostModel
    module_path: qlib.contrib.model.catboost_model
    kwargs:
      loss_function: RMSE
      learning_rate: 0.0421
      depth: 6
      l2_leaf_reg: 3.0
      iterations: 700
      random_seed: 42
      thread_count: 4
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs: *data_handler_config
      segments:
        train: [2020-01-02, 2023-12-29]
        valid: [2024-01-02, 2024-12-31]
        test: [2025-01-02, 2026-03-06]
  record:
    - class: SignalRecord
      module_path: qlib.workflow.record_temp
      kwargs: {}
    - class: SigAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs: {}
    - class: PortAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        config: *port_analysis_config
